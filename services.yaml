from __future__ import annotations

from homeassistant.components.button import ButtonEntity
from homeassistant.entity import EntityCategory

from .const import DOMAIN
from .entity import IntellinetPDUEntity


async def async_setup_entry(hass, entry, async_add_entities):
    coordinator = hass.data[DOMAIN][entry.entry_id]
    entities = [IntellinetPDUOutletRestartButton(coordinator, entry, idx) for idx in range(8)]
    async_add_entities(entities)


class IntellinetPDUOutletRestartButton(IntellinetPDUEntity, ButtonEntity):
    def __init__(self, coordinator, entry, idx):
        super().__init__(coordinator, entry)
        self._idx = idx
        self._attr_unique_id = f"{entry.entry_id}_restart_{idx + 1}"
        self._attr_entity_category = EntityCategory.CONFIG

    @property
    def name(self):
        cfg = self.coordinator.data.get("outlet_config", {}).get(self._idx)
        if cfg and getattr(cfg, "name", None):
            return f"Restart {cfg.name}"
        return f"Restart Outlet {self._idx + 1}"

    async def async_press(self) -> None:
        await self.coordinator.api.power_cycle_outlet(self._idx + 1)
        await self.coordinator.async_request_refresh()
